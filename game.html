<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Silent Room - Gameplay | Nguyễn Duy Anh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #010101;
            min-height: 100vh;
            font-family: 'Courier New', 'VT323', monospace;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 998;
        }
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 100, 0.15);
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1000;
            animation: glitchFlicker 0.08s infinite;
        }
        @keyframes glitchFlicker {
            0% { opacity: 0; }
            20% { opacity: 0.4; background: rgba(0, 255, 255, 0.2); transform: translate(1px, -1px);}
            40% { opacity: 0; }
            60% { opacity: 0.3; background: rgba(255, 0, 255, 0.2); transform: translate(-1px, 1px);}
            100% { opacity: 0; }
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0c12 0%, #020304 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }
        .cinematic-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: contrast(1.2) brightness(0.55) grayscale(0.4);
            transition: filter 0.3s;
            z-index: 0;
        }
        .ui-layer {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            backdrop-filter: blur(3px);
        }
        .stats-panel {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.75);
            padding: 10px 20px;
            border-radius: 4px;
            border-left: 4px solid #8b0000;
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }
        .stat { font-size: 1rem; color: #bcbcbc; letter-spacing: 1px; }
        .stat span { color: #d46b6b; }
        .clock {
            font-size: 1.3rem;
            background: black;
            padding: 4px 12px;
            border-radius: 2px;
            color: #ff4444;
            text-shadow: 0 0 4px red;
        }
        .dialogue-box {
            background: rgba(0, 0, 0, 0.88);
            border-top: 2px solid #4a2a2a;
            border-left: 2px solid #2a1a1a;
            padding: 22px;
            margin: 20px;
            max-width: 800px;
            align-self: center;
            width: 90%;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            font-size: 1.15rem;
            color: #ddd8c6;
        }
        .typewriter-text { min-height: 110px; line-height: 1.45; white-space: pre-wrap; }
        .choices { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 25px; justify-content: center; }
        .choice-btn {
            background: #110b0b;
            border: 1px solid #6a3e3e;
            color: #ebd5b3;
            padding: 8px 18px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn:hover { background: #2c1a1a; border-color: #aa6f6f; transform: scale(1.02); }
        .scene-title { text-align: center; margin-top: 10px; font-size: 0.75rem; color: #884d4d; letter-spacing: 3px; }
        .menu-btn {
            background: none;
            border: 1px solid #441111;
            color: #886666;
            padding: 5px 12px;
            margin-top: 10px;
            cursor: pointer;
            font-family: monospace;
        }
        .menu-btn:hover { background: #2a0a0a; color: #ffaaaa; }
        .skip-btn {
            background: #1a0a0a;
            border: 1px solid #aa5555;
            color: #cc8888;
            padding: 5px 12px;
            margin-top: 10px;
            margin-left: 10px;
            cursor: pointer;
            font-family: monospace;
        }
        .skip-btn:hover { background: #441111; color: white; }
        @keyframes vhs-jitter {
            0% { transform: translate(0);}
            25% { transform: translate(1px, -1px);}
            50% { transform: translate(-1px, 0);}
            75% { transform: translate(0, 1px);}
            100% { transform: translate(0);}
        }
        .glitch-active { animation: vhs-jitter 0.08s infinite; }
        @media (max-width: 600px) {
            .dialogue-box { font-size: 0.9rem; padding: 14px; }
            .stat { font-size: 0.7rem; }
            .choice-btn { font-size: 0.7rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div class="cinematic-bg" id="bgImage"></div>
    <div class="ui-layer">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div class="stats-panel">
                <div class="stat" id="trustText">❤️ TIN TƯỞNG: <span id="trustVal">50</span>%</div>
                <div class="stat" id="stressText">🌙 CĂNG THẲNG: <span id="stressVal">0</span>%</div>
                <div class="stat" id="corruptText">🕯️ HOEN Ố: <span id="corruptVal">0</span>%</div>
                <div class="stat" id="memoryText">📖 KÝ ỨC: <span id="memoryVal">0</span>%</div>
                <div class="stat" id="doorText">🔑 CÁNH CỬA: <span id="doorProgress">0</span>/7</div>
            </div>
            <div class="clock" id="clockDisplay">⏰ 20:00</div>
        </div>
        <div class="dialogue-box">
            <div class="typewriter-text" id="dialogueText">...</div>
            <div class="choices" id="choicesContainer"></div>
            <div style="text-align: center; margin-top: 12px;">
                <button class="menu-btn" id="menuBtn">🏠 MENU CHÍNH</button>
                <button class="menu-btn" id="saveBtn">💾 LƯU TRẠNG THÁI</button>
                <button class="skip-btn" id="skipBtn">⏩ SKIP (BỎ QUA LỜI)</button>
            </div>
        </div>
        <div class="scene-title" id="sceneName">--- hành lang vọng âm ---</div>
    </div>
</div>

<script>
    // ========== NGÔN NGỮ ==========
    let currentLang = "vn";
    const langData = {
        vn: {
            trust: "❤️ TIN TƯỞNG",
            stress: "🌙 CĂNG THẲNG",
            corruption: "🕯️ HOEN Ố",
            memory: "📖 KÝ ỨC",
            door: "🔑 CÁNH CỬA",
            menu: "🏠 MENU CHÍNH",
            save: "💾 LƯU TRẠNG THÁI",
            skip: "⏩ SKIP (BỎ QUA LỜI)",
            endings: {
                good: "✨ Bạn Đã Được Lắng Nghe ✨",
                neutral: "🌫️ Không Ai Để Ý 🌫️",
                bad: "🖤 Sự Im Lặng Ở Lại 🖤",
                secret: "🚪 Cánh Cửa Vẫn Mở 🚪"
            },
            endingMessage: "Những vọng âm của bạn vẫn còn trong căn phòng.\nNhưng có một cánh cửa đã mở ra."
        },
        en: {
            trust: "❤️ TRUST",
            stress: "🌙 STRESS",
            corruption: "🕯️ CORRUPTION",
            memory: "📖 MEMORY",
            door: "🔑 DOOR",
            menu: "🏠 MAIN MENU",
            save: "💾 SAVE GAME",
            skip: "⏩ SKIP TEXT",
            endings: {
                good: "✨ You Were Heard ✨",
                neutral: "🌫️ Nobody Noticed 🌫️",
                bad: "🖤 The Silence Stayed 🖤",
                secret: "🚪 The Door Stayed Open 🚪"
            },
            endingMessage: "Your echoes remain in the silent room.\nBut a door has opened."
        }
    };

    function updateGameLanguage() {
        const lang = langData[currentLang];
        document.getElementById("trustText").innerHTML = `${lang.trust}: <span id="trustVal">${Math.floor(gameState.trust)}</span>%`;
        document.getElementById("stressText").innerHTML = `${lang.stress}: <span id="stressVal">${Math.floor(gameState.stress)}</span>%`;
        document.getElementById("corruptText").innerHTML = `${lang.corruption}: <span id="corruptVal">${Math.floor(gameState.corruption)}</span>%`;
        document.getElementById("memoryText").innerHTML = `${lang.memory}: <span id="memoryVal">${Math.floor(gameState.memory)}</span>%`;
        document.getElementById("doorText").innerHTML = `${lang.door}: <span id="doorProgress">${gameState.doorFragments}</span>/7`;
        document.getElementById("menuBtn").innerHTML = lang.menu;
        document.getElementById("saveBtn").innerHTML = lang.save;
        document.getElementById("skipBtn").innerHTML = lang.skip;
    }

    // ========== AUDIO ==========
    let audioSettings = { musicVol: 0.20, voiceVol: 0.55, sfxVol: 0.40, vhsIntensity: 60, textSpeed: 30 };
    let ambientAudio = null, voicePlayer = null, sfxPlayer = null;

    function loadAudioSettings() {
        const saved = localStorage.getItem("silentRoomAudio");
        if (saved) {
            const parsed = JSON.parse(saved);
            audioSettings = { ...audioSettings, ...parsed };
        }
        const savedLang = localStorage.getItem("gameLanguage");
        if (savedLang === "en") currentLang = "en";
        
        ambientAudio = new Audio();
        ambientAudio.loop = true;
        ambientAudio.volume = audioSettings.musicVol;
        ambientAudio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        document.body.appendChild(ambientAudio);
        
        voicePlayer = new Audio();
        voicePlayer.volume = audioSettings.voiceVol;
        voicePlayer.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3";
        document.body.appendChild(voicePlayer);
        
        sfxPlayer = new Audio();
        sfxPlayer.volume = audioSettings.sfxVol;
        sfxPlayer.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
        document.body.appendChild(sfxPlayer);
        
        ambientAudio.play().catch(e => console.log("Audio autoplay blocked"));
        updateGameLanguage();
    }

    function playVoice() { 
        if (voicePlayer && audioSettings.voiceVol > 0) { 
            voicePlayer.currentTime = 0; 
            voicePlayer.play().catch(e => console.log); 
        } 
    }
    
    function playSfx() { 
        if (sfxPlayer && audioSettings.sfxVol > 0) { 
            sfxPlayer.currentTime = 0; 
            sfxPlayer.play().catch(e => console.log); 
        } 
    }

    // ========== GAME STATE ==========
    let gameState = {
        trust: 50, stress: 0, corruption: 0, memory: 0,
        hour: 20, minute: 0, gameActive: true, currentSceneId: "hallway_start",
        endingsUnlocked: [], doorFragments: 0
    };
    let typewriterTimeout = null;
    let isTyping = false;
    let currentTypingPromise = null;
    let skipRequested = false;
    let currentSceneObj = null;

    function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }

    function updateUI() {
        const lang = langData[currentLang];
        document.getElementById("trustVal").innerText = Math.floor(gameState.trust);
        document.getElementById("stressVal").innerText = Math.floor(gameState.stress);
        document.getElementById("corruptVal").innerText = Math.floor(gameState.corruption);
        document.getElementById("memoryVal").innerText = Math.floor(gameState.memory);
        document.getElementById("doorProgress").innerText = gameState.doorFragments;
        document.getElementById("trustText").innerHTML = `${lang.trust}: <span id="trustVal">${Math.floor(gameState.trust)}</span>%`;
        document.getElementById("stressText").innerHTML = `${lang.stress}: <span id="stressVal">${Math.floor(gameState.stress)}</span>%`;
        document.getElementById("corruptText").innerHTML = `${lang.corruption}: <span id="corruptVal">${Math.floor(gameState.corruption)}</span>%`;
        document.getElementById("memoryText").innerHTML = `${lang.memory}: <span id="memoryVal">${Math.floor(gameState.memory)}</span>%`;
        document.getElementById("doorText").innerHTML = `${lang.door}: <span id="doorProgress">${gameState.doorFragments}</span>/7`;
        
        let timeStr = `${gameState.hour.toString().padStart(2,'0')}:${gameState.minute.toString().padStart(2,'0')}`;
        document.getElementById("clockDisplay").innerHTML = `⏰ ${timeStr}`;
        
        if (gameState.stress >= 60 && !document.querySelector('.glitch-overlay')) {
            let glitchDiv = document.createElement('div'); glitchDiv.className = 'glitch-overlay';
            document.body.appendChild(glitchDiv);
            document.getElementById("game-container").classList.add('glitch-active');
            playSfx();
        } else if (gameState.stress < 60 && document.querySelector('.glitch-overlay')) {
            document.querySelector('.glitch-overlay').remove();
            document.getElementById("game-container").classList.remove('glitch-active');
        }
        let bgDiv = document.getElementById("bgImage");
        let blurAmount = Math.min(6, gameState.corruption / 18);
        bgDiv.style.filter = `contrast(1.1) brightness(${0.6 - gameState.corruption/180}) grayscale(${gameState.corruption/100}) blur(${blurAmount}px)`;
    }

    function advanceTime(mins=5) {
        if (!gameState.gameActive) return;
        gameState.minute += mins;
        if (gameState.minute >= 60) { gameState.hour++; gameState.minute = 0; if (gameState.hour > 23) gameState.hour = 23; }
        updateUI();
    }

    function modifyStats(dTrust, dStress, dCorrupt, dMemory, dDoor=0) {
        if (!gameState.gameActive) return;
        gameState.trust = clamp(gameState.trust + dTrust, 0, 100);
        gameState.stress = clamp(gameState.stress + dStress, 0, 100);
        gameState.corruption = clamp(gameState.corruption + dCorrupt, 0, 100);
        gameState.memory = clamp(gameState.memory + dMemory, 0, 100);
        gameState.doorFragments = clamp(gameState.doorFragments + dDoor, 0, 7);
        
        if (gameState.corruption >= 85 && gameState.trust < 20) triggerEnding("bad");
        if (gameState.memory >= 80 && gameState.trust >= 70 && gameState.corruption <= 25) triggerEnding("good");
        if (gameState.stress >= 95) triggerEnding("neutral");
        if (gameState.memory >= 70 && gameState.corruption >= 40 && gameState.trust <= 30) triggerEnding("secret");
        if (gameState.doorFragments >= 7 && gameState.memory >= 60) triggerEnding("good");
        updateUI();
    }

    function setBackground(key) {
        const bgMap = {
            hallway: "https://placehold.co/1920x1080/1a1210/2c1e1a?text=HALLWAY",
            childroom: "https://placehold.co/1920x1080/0f0c18/1f1a2e?text=CHILD+ROOM",
            classroom: "https://placehold.co/1920x1080/1c1b1a/3e2f2a?text=CLASSROOM",
            night_corridor: "https://placehold.co/1920x1080/050505/2f1414?text=NIGHT+CORRIDOR",
            memory_garden: "https://placehold.co/1920x1080/15222b/1d3e3a?text=MEMORY+GARDEN",
            door_room: "https://placehold.co/1920x1080/0a080f/2b1b2c?text=THE+DOOR",
            basement: "https://placehold.co/1920x1080/030000/1a0808?text=BASEMENT",
            window: "https://placehold.co/1920x1080/0a1520/1a2a35?text=WINDOW"
        };
        document.getElementById("bgImage").style.backgroundImage = `url('${bgMap[key]||bgMap.hallway}')`;
    }

    async function typewriterEffect(text, element, speed) {
        if (typewriterTimeout) clearTimeout(typewriterTimeout);
        isTyping = true;
        skipRequested = false;
        element.innerHTML = "";
        
        for (let i = 0; i < text.length; i++) {
            if (skipRequested || !gameState.gameActive) {
                element.innerHTML = text;
                break;
            }
            element.innerHTML += text[i];
            await new Promise(r => {
                currentTypingPromise = r;
                setTimeout(r, speed);
            });
        }
        isTyping = false;
        currentTypingPromise = null;
    }
    
    function skipText() {
        if (isTyping) {
            skipRequested = true;
            if (currentTypingPromise) currentTypingPromise();
        }
    }

    async function showScene(scene) {
        if (!gameState.gameActive) return;
        currentSceneObj = scene;
        setBackground(scene.bg);
        document.getElementById("sceneName").innerText = scene.sceneTitle;
        
        const speed = audioSettings.textSpeed;
        await typewriterEffect(scene.dialogue, document.getElementById("dialogueText"), speed);
        
        if (scene.hasVoice) playVoice();
        const container = document.getElementById("choicesContainer");
        container.innerHTML = "";
        scene.choices.forEach(choice => {
            let btn = document.createElement("button");
            btn.innerText = choice.text;
            btn.className = "choice-btn";
            btn.onclick = () => { if(gameState.gameActive) choice.action(); };
            container.appendChild(btn);
        });
    }

    function triggerEnding(type) {
        if (!gameState.gameActive) return;
        gameState.gameActive = false;
        const lang = langData[currentLang];
        let endingDesc = lang.endings[type];
        if (!gameState.endingsUnlocked.includes(endingDesc)) gameState.endingsUnlocked.push(endingDesc);
        localStorage.setItem("silentRoomEndings", JSON.stringify(gameState.endingsUnlocked));
        document.getElementById("dialogueText").innerHTML = `[ ${lang.endings[type]} ]\n━━━━━━━━━━━━━━━━━━━\n\n${lang.endingMessage}\n\nPress MAIN MENU to return.`;
        document.getElementById("choicesContainer").innerHTML = "";
        if (ambientAudio) ambientAudio.pause();
        updateUI();
    }

    function saveGame() {
        const saveData = {
            trust: gameState.trust, stress: gameState.stress, corruption: gameState.corruption,
            memory: gameState.memory, hour: gameState.hour, minute: gameState.minute,
            doorFragments: gameState.doorFragments, currentSceneId: gameState.currentSceneId
        };
        localStorage.setItem("silentRoomSave", JSON.stringify(saveData));
        const dialogueDiv = document.getElementById("dialogueText");
        dialogueDiv.innerHTML += "\n\n💾 Game Saved!";
        setTimeout(() => {
            if (currentSceneObj) showScene(currentSceneObj);
        }, 1000);
    }

    function loadGame() {
        const saved = localStorage.getItem("silentRoomSave");
        if (saved) {
            const data = JSON.parse(saved);
            gameState.trust = data.trust; gameState.stress = data.stress;
            gameState.corruption = data.corruption; gameState.memory = data.memory;
            gameState.hour = data.hour; gameState.minute = data.minute;
            gameState.doorFragments = data.doorFragments || 0;
            gameState.currentSceneId = data.currentSceneId;
            updateUI();
            sceneTransition(gameState.currentSceneId);
        }
    }

    // ========== 25+ SCENES (Bilingual) ==========
    const scenes = {
        hallway_start: {
            bg: "hallway", sceneTitle: currentLang === "vn" ? "hành lang - nơi bắt đầu" : "hallway - where it begins",
            dialogue: currentLang === "vn" ? 
                "[Bạn mở mắt trong căn nhà cũ kỹ]\n\nHành lang dài hun hút. Mỗi bước chân vang lên như tiếng gõ cửa ký ức. Trên tường, những bức ảnh cũ mờ nhòe — khuôn mặt ai đó đã bị xóa.\n\nĐồng hồ treo tường chỉ 8 giờ tối." :
                "[You wake up in an old house]\n\nThe hallway stretches endlessly. Each footstep echoes like a knock on memory's door. On the wall, old faded photographs — someone's face has been scratched out.\n\nThe wall clock reads 8 PM.",
            hasVoice: true,
            choices: [
                { text: currentLang === "vn" ? "🚪 Đi xuống cầu thang" : "🚪 Go downstairs", action: () => { modifyStats(0,3,1,2); advanceTime(8); sceneTransition("basement_scene"); } },
                { text: currentLang === "vn" ? "🪞 Nhìn vào tấm gương" : "🪞 Look into the mirror", action: () => { modifyStats(-2,8,3,1); advanceTime(5); sceneTransition("mirror_scene"); } },
                { text: currentLang === "vn" ? "📸 Xem những bức ảnh" : "📸 Look at photos", action: () => { modifyStats(2,2,0,8,1); advanceTime(10); sceneTransition("photos_scene"); } },
                { text: currentLang === "vn" ? "🚪 Về phòng ngủ" : "🚪 Go to bedroom", action: () => { modifyStats(5,-5,-2,5); advanceTime(15); sceneTransition("childroom_memory"); } }
            ]
        },
        basement_scene: {
            bg: "basement", sceneTitle: currentLang === "vn" ? "tầng hầm - nơi chôn giấu" : "basement - buried secrets",
            dialogue: currentLang === "vn" ?
                "Cầu thang ọp ẹp đưa bạn xuống tầng hầm. Không khí ẩm mốc. Trong góc, một chiếc hộp gỗ cũ kỹ. Bên cạnh là những vết xước trên tường — hình bàn tay nhỏ.\n\nMột mùi quen thuộc: khói thuốc và nỗi sợ." :
                "Creaky stairs lead you to the basement. Damp air. In the corner, an old wooden box. Nearby, scratches on the wall — small handprints.\n\nA familiar smell: cigarette smoke and fear.",
            hasVoice: true,
            choices: [
                { text: currentLang === "vn" ? "📦 Mở chiếc hộp bí mật" : "📦 Open the secret box", action: () => { modifyStats(5,12,5,10,1); advanceTime(10); sceneTransition("secret_box"); } },
                { text: currentLang === "vn" ? "🔙 Trở lên trên" : "🔙 Go back up", action: () => { modifyStats(-3,5,2,0); advanceTime(5); sceneTransition("hallway_start"); } }
            ]
        },
        secret_box: {
            bg: "basement", sceneTitle: currentLang === "vn" ? "kỷ vật bị chôn vùi" : "buried keepsakes",
            dialogue: currentLang === "vn" ?
                "Chiếc hộp mở ra. Bên trong: một con thú bông rách, bức thư chưa gửi, và một chiếc áo cũ của mẹ. Dòng chữ nguệch ngoạc: 'Con nhớ mẹ'.\n\nNước mắt bạn rơi xuống những trang giấy ố vàng." :
                "The box opens. Inside: a torn stuffed animal, an unsent letter, and an old shirt that smells like mother. Scribbled words: 'I miss you, Mom'.\n\nTears fall on yellowed paper.",
            hasVoice: true,
            choices: [
                { text: currentLang === "vn" ? "💔 Giữ lấy những kỷ vật" : "💔 Keep the keepsakes", action: () => { modifyStats(8,-8,-3,15,1); advanceTime(8); sceneTransition("hallway_start"); } },
                { text: currentLang === "vn" ? "🔥 Đốt chúng (quên đi)" : "🔥 Burn them (forget)", action: () => { modifyStats(-10,20,15,-5); advanceTime(10); sceneTransition("livingroom_stepfather"); } }
            ]
        },
        mirror_scene: {
            bg: "night_corridor", sceneTitle: currentLang === "vn" ? "tấm gương nứt vỡ" : "cracked mirror",
            dialogue: currentLang === "vn" ?

    function sceneTransition(sceneId) {
        gameState.currentSceneId = sceneId;
        let scene = scenes[sceneId];
        if (scene) {
            showScene(scene);
        } else {
            showScene(scenes.hallway_start);
        }
    }

    function resetToMenu() {
        if (typewriterTimeout) clearTimeout(typewriterTimeout);
        if (ambientAudio) ambientAudio.pause();
        window.location.href = "index.html";
    }

    // Event listeners
    document.getElementById("menuBtn").onclick = resetToMenu;
    document.getElementById("saveBtn").onclick = saveGame;
    document.getElementById("skipBtn").onclick = skipText;

    // Initialize
    loadAudioSettings();
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('new')) {
        sceneTransition("hallway_start");
    } else {
        const saved = localStorage.getItem("silentRoomSave");
        if (saved) loadGame();
        else sceneTransition("hallway_start");
    }

    // Auto stress at night
    setInterval(() => {
        if (gameState.gameActive && (gameState.hour >= 22 || gameState.hour <= 5)) {
            modifyStats(0, gameState.corruption > 30 ? 2 : 1, 0, 0);
        }
    }, 18000);

    let vignetteDiv = document.createElement('div'); vignetteDiv.className = 'vignette'; document.body.appendChild(vignetteDiv);
</script>
