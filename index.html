<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft - Nước Không Lag</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background:#87CEEB; font-family: 'Courier New', monospace; }
  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
    background: white; border-radius: 50%; transform: translate(-50%, -50%);
    pointer-events: none; mix-blend-mode: difference; z-index: 5;
  }
  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: white; background: rgba(0,0,0,0.7); padding: 8px 14px; border-radius: 4px;
    font-size: 12px; z-index: 5; text-align: center; line-height: 1.5;
    border: 2px solid rgba(255,255,255,0.3); image-rendering: pixelated;
    max-width: 90%;
  }
  #hotbar {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px; z-index: 5; background: rgba(0,0,0,0.6);
    padding: 4px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.3);
  }
  .slot {
    width: 44px; height: 44px; border: 2px solid #555; border-radius: 2px;
    display: flex; align-items: center; justify-content: center; box-sizing: border-box;
    background: rgba(0,0,0,0.3); position: relative; cursor: pointer;
  }
  .slot.active { border-color: #fff; background: rgba(255,255,255,0.15); }
  .slot:hover { border-color: #aaa; }
  #healthContainer {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.6); padding: 4px 10px 4px 6px;
    border-radius: 4px; border: 2px solid rgba(255,255,255,0.3);
  }
  #healthIcon { font-size: 20px; }
  #healthBarBg {
    width: 160px; height: 16px; background: rgba(0,0,0,0.5);
    border: 2px solid #555; border-radius: 2px; overflow: hidden;
  }
  #healthBarFill {
    height: 100%; width: 100%; background: #c92a2a;
    transition: width 0.2s ease; image-rendering: pixelated;
  }
  #healthText {
    color: white; font-size: 13px; font-weight: bold; text-shadow: 2px 2px 0 #000;
    font-family: 'Courier New', monospace;
  }
  #blocker {
    position: absolute; inset: 0; background: rgba(0,0,0,0.75); color: white;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; z-index: 10; text-align: center;
    font-family: 'Courier New', monospace;
  }
  #blocker h2 { font-size: 48px; margin: 0; text-shadow: 4px 4px 0 #2d2d2d; }
  #blocker p { font-size: 18px; opacity: 0.8; }

  /* ----- Điều khiển mobile ----- */
  #mobileControls { display: none; }
  #lookArea {
    position: absolute; right: 0; top: 0; width: 55%; height: 100%; z-index: 3;
    touch-action: none;
  }
  #joystickBase {
    position: absolute; left: 26px; bottom: 26px; width: 120px; height: 120px;
    border-radius: 50%; background: rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.5); z-index: 6; touch-action: none;
  }
  #joystickKnob {
    position: absolute; left: 35px; top: 35px; width: 50px; height: 50px;
    border-radius: 50%; background: rgba(255,255,255,0.5); pointer-events: none;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .actionBtn {
    position: absolute; border-radius: 4px; background: rgba(0,0,0,0.6);
    border: 3px solid rgba(255,255,255,0.4); color: white; z-index: 6;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; user-select: none; touch-action: none;
    font-family: 'Courier New', monospace; text-shadow: 2px 2px 0 #000;
    transition: all 0.1s;
  }
  .actionBtn:active { transform: scale(0.92); background: rgba(0,0,0,0.8); }
  #jumpBtn   { right: 26px; bottom: 26px;  width: 72px; height: 72px; font-size: 15px; }
  #breakBtn  { right: 118px; bottom: 100px; width: 60px; height: 60px; font-size: 12px; }
  #placeBtn  { right: 26px; bottom: 118px; width: 60px; height: 60px; font-size: 12px; }
  #sitMobileBtn { right: 118px; bottom: 26px; width: 60px; height: 60px; font-size: 12px; }
  #runMobileBtn { right: 190px; bottom: 26px; width: 60px; height: 60px; font-size: 12px; }
  .actionBtn.toggledOn { background: #2e7d32 !important; border-color: #fff; }

  /* ----- Nút trên PC ----- */
  .topBtn {
    position: absolute; top: 14px; z-index: 7; width: 44px; height: 44px;
    background: rgba(0,0,0,0.7); border: 3px solid rgba(255,255,255,0.4);
    color: white; font-size: 20px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; border-radius: 4px;
    font-family: 'Courier New', monospace; transition: all 0.15s;
  }
  .topBtn:hover { background: rgba(0,0,0,0.9); border-color: #fff; }
  #fullscreenBtn { right: 14px; }
  #settingsBtn   { right: 66px; }
  #inventoryBtn  { right: 118px; }

  #settingsPanel, #inventoryPanel {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 9; color: white; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
  }
  .box {
    background: rgba(30,30,30,0.95); padding: 24px 28px; border-radius: 4px;
    width: 280px; text-align: left; border: 3px solid #555;
  }
  .box h3 { margin: 0 0 16px; text-align: center; font-size: 20px; }
  .box label { display: block; margin: 14px 0 6px; font-size: 13px; }
  .box input[type=range] { width: 100%; accent-color: #4caf50; }
  .box .val { float: right; opacity: 0.8; }
  .box button {
    margin-top: 20px; width: 100%; padding: 10px; border-radius: 4px; border: none;
    background: #4caf50; color: white; font-weight: bold; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 14px;
  }
  
  #invGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .invItem {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.06); border-radius: 4px; padding: 8px 4px; font-size: 12px;
    border: 2px solid #444;
  }
  .invSwatch { width: 28px; height: 28px; border-radius: 2px; border: 2px solid #555; }
  .hotbarCount {
    position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: white;
    text-shadow: 2px 2px 0 #000; pointer-events: none;
    font-family: 'Courier New', monospace;
  }

  /* ----- Thanh đói ----- */
  #hungerContainer {
    position: absolute; top: 54px; left: 14px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.6); padding: 4px 10px 4px 6px;
    border-radius: 4px; border: 2px solid rgba(255,255,255,0.3);
  }
  #hungerIcon { font-size: 18px; }
  #hungerBarBg {
    width: 160px; height: 14px; background: rgba(0,0,0,0.5);
    border: 2px solid #555; border-radius: 2px; overflow: hidden;
  }
  #hungerBarFill {
    height: 100%; width: 100%; background: #e67700;
    transition: width 0.2s ease; image-rendering: pixelated;
  }
  #hungerText { color: white; font-size: 12px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
  #eatBtn {
    margin-left: 4px; padding: 3px 8px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.6); color: white; font-size: 12px; cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  #eatBtn:disabled { opacity: 0.4; cursor: default; }

  /* ----- Ngồi / Chạy (PC) ----- */
  #moveModeButtons {
    position: absolute; top: 88px; left: 14px; z-index: 5; display: flex; gap: 4px;
  }
  #moveModeButtons button {
    padding: 6px 12px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.6); color: white; font-size: 12px; cursor: pointer;
    font-family: 'Courier New', monospace; transition: all 0.15s;
  }
  #moveModeButtons button:hover { background: rgba(0,0,0,0.8); }
  #moveModeButtons button.toggledOn { background: #2e7d32; border-color: #fff; }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="healthContainer">
  <span id="healthIcon">❤️</span>
  <div id="healthBarBg"><div id="healthBarFill"></div></div>
  <span id="healthText">100</span>
</div>
<div id="hungerContainer">
  <span id="hungerIcon">🍗</span>
  <div id="hungerBarBg"><div id="hungerBarFill"></div></div>
  <span id="hungerText">100</span>
  <button id="eatBtn">Ăn <span id="meatCountLabel">0</span></button>
</div>
<div id="hint">WASD: di chuyển | Chuột: nhìn | Space: nhảy<br>Chuột trái: phá/đánh | Chuột phải: đặt | 1-7: chọn khối<br>F: ăn | I: túi | C: ngồi | Shift: chạy</div>
<div id="moveModeButtons">
  <button id="sitBtn">🪑 Ngồi</button>
  <button id="runBtn">🏃 Chạy</button>
</div>
<div id="hotbar"></div>
<div id="blocker"><h2>MINECRAFT</h2><p>Click để bắt đầu</p></div>

<div id="fullscreenBtn" class="topBtn">⛶</div>
<div id="settingsBtn" class="topBtn">⚙</div>
<div id="inventoryBtn" class="topBtn">🎒</div>
<div id="inventoryPanel">
  <div class="box">
    <h3>📦 Túi đồ</h3>
    <div id="invGrid"></div>
    <button id="closeInventory">Đóng</button>
  </div>
</div>
<div id="settingsPanel">
  <div class="box">
    <h3>⚙ Cài đặt</h3>
    <label>Độ nhạy chuột <span class="val" id="mouseSensVal">1.0x</span></label>
    <input type="range" id="mouseSensSlider" min="0.2" max="3" step="0.1" value="1">
    <label>Độ nhạy chạm <span class="val" id="touchSensVal">1.0x</span></label>
    <input type="range" id="touchSensSlider" min="0.2" max="3" step="0.1" value="1">
    <button id="closeSettings">Đóng</button>
  </div>
</div>

<div id="mobileControls">
  <div id="lookArea"></div>
  <div id="joystickBase"><div id="joystickKnob"></div></div>
  <div id="breakBtn" class="actionBtn">⛏ Phá</div>
  <div id="placeBtn" class="actionBtn">📦 Đặt</div>
  <div id="jumpBtn" class="actionBtn">⬆ Nhảy</div>
  <div id="sitMobileBtn" class="actionBtn">🪑</div>
  <div id="runMobileBtn" class="actionBtn">🏃</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ----- Cấu hình cơ bản -----
const WORLD_SIZE = 100;
const WATER_LEVEL = 2;
const BLOCK_TYPES = [
  { name: 'Cỏ',  color: 0x4caf50, transparent: false },
  { name: 'Đất', color: 0x8d6e42, transparent: false },
  { name: 'Đá',  color: 0x888888, transparent: false },
  { name: 'Cát', color: 0xe0d18f, transparent: false },
  { name: 'Gỗ',  color: 0x6b4423, transparent: false },
  { name: 'Lá',  color: 0x2e7d32, transparent: false },
  { name: 'Nước', color: 0x1e88e5, transparent: true, opacity: 0.6 }
];

let selectedBlock = 0;
const inventory = new Array(BLOCK_TYPES.length).fill(10);

// ----- Scene / Camera / Renderer -----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false; // Tắt shadow để tối ưu
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ----- Ánh sáng -----
scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 0.4);
sun.position.set(30, 80, 20);
scene.add(sun);

// ----- Hệ thống InstancedMesh (không lag) -----
const blockGeo = new THREE.BoxGeometry(1, 1, 1);
const materials = BLOCK_TYPES.map(b => new THREE.MeshLambertMaterial({ 
  color: b.color, 
  transparent: b.transparent, 
  opacity: b.opacity !== undefined ? b.opacity : 1 
}));

const maxInstances = WORLD_SIZE * WORLD_SIZE * 15;
const instancedMeshes = BLOCK_TYPES.map((_, i) => {
  const im = new THREE.InstancedMesh(blockGeo, materials[i], maxInstances);
  im.count = 0;
  scene.add(im);
  return im;
});

const worldData = new Map();
const worldVisuals = new Map();

function key(x,y,z){ return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

function heightAt(x, z) {
  return Math.floor(3 + Math.sin(x/8)*3 + Math.cos(z/8)*3 + Math.sin(x/15 + z/12)*2);
}

function hashRandom(x, z, seed) {
  let h = Math.sin(x * 127.1 + z * 311.7 + seed * 74.7) * 43758.5453;
  return h - Math.floor(h);
}

function isVoidPit(x, z) {
  if (Math.hypot(x, z) < 8) return false;
  return hashRandom(x, z, 1) < 0.02;
}

// ----- Khởi tạo Map dữ liệu địa hình -----
console.log('Đang tạo map siêu to với nước không lag...');
let waterCount = 0;

for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
  for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
    if (isVoidPit(x, z)) continue;
    const h = heightAt(x, z);
    
    // Đất và đá
    for (let y = -2; y <= Math.max(h, 1); y++) {
      let type = 2; // Đá
      if (y === h) {
        if (h <= WATER_LEVEL) type = 3; // Cát ở vùng nước
        else type = 0; // Cỏ
      } else if (y > h - 2) {
        type = 1; // Đất
      }
      worldData.set(key(x,y,z), type);
    }
    
    // Nước - chỉ thêm ở vùng trũng
    if (h < WATER_LEVEL) {
      for (let y = h + 1; y <= WATER_LEVEL; y++) {
        // Chỉ thêm nước nếu tạo thành hồ nước hoặc nằm ở vùng trũng rộng
        const hasWaterNearby = 
          worldData.has(key(x+1, y, z)) || worldData.has(key(x-1, y, z)) ||
          worldData.has(key(x, y, z+1)) || worldData.has(key(x, y, z-1));
        
        if (waterCount < 3000 || hasWaterNearby) {
          worldData.set(key(x,y,z), 6); // Index của nước
          waterCount++;
        }
      }
    }
  }
}
console.log('Số khối nước:', waterCount);

// ----- Xây dựng visual bằng InstancedMesh -----
function rebuildVisuals() {
  instancedMeshes.forEach(im => im.count = 0);
  worldVisuals.clear();
  const dummy = new THREE.Object3D();
  const counts = new Array(BLOCK_TYPES.length).fill(0);

  for (let [kStr, type] of worldData.entries()) {
    const [x, y, z] = kStr.split(',').map(Number);
    
    // Culling để tối ưu hiệu năng
    if (type !== 6) { // Không cull nước
      const top = worldData.has(key(x, y+1, z));
      const bottom = worldData.has(key(x, y-1, z));
      const left = worldData.has(key(x-1, y, z));
      const right = worldData.has(key(x+1, y, z));
      const front = worldData.has(key(x, y, z+1));
      const back = worldData.has(key(x, y, z-1));
      if (top && bottom && left && right && front && back) continue;
    }

    const im = instancedMeshes[type];
    const idx = counts[type];
    dummy.position.set(x, y, z);
    dummy.updateMatrix();
    im.setMatrixAt(idx, dummy.matrix);
    
    worldVisuals.set(kStr, { type, instanceIdx: idx });
    counts[type]++;
  }
  
  instancedMeshes.forEach((im, i) => {
    im.count = counts[i];
    im.instanceMatrix.needsUpdate = true;
  });
}
rebuildVisuals();

// ----- Động vật -----
const animals = [];
const MEAT_TYPES = {
  pig: { color: 0xe8a0b4, name: 'Thịt heo' },
  cow: { color: 0xc0392b, name: 'Thịt bò' },
  sheep: { color: 0xecf0f1, name: 'Thịt cừu' }
};

function createAnimalMesh(kind) {
  const group = new THREE.Group();
  let bodyColor, headColor, legColor, bodySize, headSize;
  if (kind === 'pig') {
    bodyColor = 0xf3a9c1; headColor = 0xf3a9c1; legColor = 0xdb88a4;
    bodySize = [0.9, 0.55, 1.2]; headSize = [0.5, 0.45, 0.45];
  } else if (kind === 'cow') {
    bodyColor = 0xf5f0e6; headColor = 0x3b2a20; legColor = 0x3b2a20;
    bodySize = [1.0, 0.65, 1.4]; headSize = [0.5, 0.5, 0.5];
  } else {
    bodyColor = 0xffffff; headColor = 0x2b2b2b; legColor = 0x2b2b2b;
    bodySize = [0.9, 0.6, 1.1]; headSize = [0.4, 0.4, 0.4];
  }
  const bodyMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const headMat = new THREE.MeshLambertMaterial({ color: headColor });
  const legMat = new THREE.MeshLambertMaterial({ color: legColor });

  const body = new THREE.Mesh(new THREE.BoxGeometry(...bodySize), bodyMat);
  body.position.y = 0.55; body.castShadow = true; group.add(body);
  const head = new THREE.Mesh(new THREE.BoxGeometry(...headSize), headMat);
  head.position.set(0, 0.65, bodySize[2]/2 + headSize[2]/2 - 0.05); head.castShadow = true; group.add(head);
  const legGeo = new THREE.BoxGeometry(0.15, 0.4, 0.15);
  const ox = bodySize[0]/2 - 0.1, oz = bodySize[2]/2 - 0.15;
  [[ox,oz],[-ox,oz],[ox,-oz],[-ox,-oz]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, legMat); leg.position.set(lx, 0.2, lz); leg.castShadow = true; group.add(leg);
  });
  group.traverse(c => { if (c.isMesh) c.userData.isAnimalPart = true; });
  return group;
}

function spawnAnimalAt(kind, x, z) {
  const h = heightAt(x, z);
  if (h <= WATER_LEVEL) return;
  const mesh = createAnimalMesh(kind);
  mesh.position.set(x, h + 0.5, z);
  scene.add(mesh);
  animals.push({ mesh, kind, hp: 3, target: { x, z }, speed: 0.018 + Math.random()*0.014, nextDecision: 0 });
}

function spawnRandomAnimal(kind) {
  for (let tries = 0; tries < 30; tries++) {
    const x = Math.floor((Math.random()-0.5) * WORLD_SIZE * 0.7);
    const z = Math.floor((Math.random()-0.5) * WORLD_SIZE * 0.7);
    const h = heightAt(x, z);
    if (h <= WATER_LEVEL || isVoidPit(x, z)) continue;
    spawnAnimalAt(kind, x, z);
    return;
  }
}

for (let i = 0; i < 20; i++) {
  const kinds = ['pig', 'cow', 'sheep'];
  spawnRandomAnimal(kinds[i % kinds.length]);
}

function updateAnimals() {
  const now = performance.now();
  animals.forEach(a => {
    if (now > a.nextDecision) {
      let tx, tz, ok = false;
      for (let tries = 0; tries < 8; tries++) {
        tx = THREE.MathUtils.clamp(a.mesh.position.x + (Math.random()-0.5)*12, -WORLD_SIZE/2+2, WORLD_SIZE/2-2);
        tz = THREE.MathUtils.clamp(a.mesh.position.z + (Math.random()-0.5)*12, -WORLD_SIZE/2+2, WORLD_SIZE/2-2);
        const h = heightAt(Math.round(tx), Math.round(tz));
        if (h > WATER_LEVEL && !isVoidPit(Math.round(tx), Math.round(tz))) { ok = true; break; }
      }
      if (ok) a.target = { x: tx, z: tz };
      a.nextDecision = now + 2500 + Math.random()*3000;
    }
    const dx = a.target.x - a.mesh.position.x;
    const dz = a.target.z - a.mesh.position.z;
    const dist = Math.hypot(dx, dz);
    if (dist > 0.1) {
      a.mesh.position.x += (dx/dist) * a.speed;
      a.mesh.position.z += (dz/dist) * a.speed;
      a.mesh.rotation.y = Math.atan2(dx, dz);
    }
    const groundH = heightAt(Math.round(a.mesh.position.x), Math.round(a.mesh.position.z));
    a.mesh.position.y = Math.max(groundH + 0.5, WATER_LEVEL + 0.5);
  });
}

function flashAnimal(a) {
  a.mesh.traverse(c => {
    if (c.isMesh) {
      const original = c.material.color.getHex();
      c.material = c.material.clone();
      c.material.color.setHex(0xff5555);
      setTimeout(() => { if (c.material) c.material.color.setHex(original); }, 120);
    }
  });
}

function attackAnimal(idx) {
  const a = animals[idx]; if (!a) return;
  a.hp--; flashAnimal(a);
  if (a.hp <= 0) {
    scene.remove(a.mesh);
    const meatColor = MEAT_TYPES[a.kind].color;
    spawnDropEffect(a.mesh.position.x, a.mesh.position.y, a.mesh.position.z, meatColor);
    addMeat(a.kind);
    animals.splice(idx, 1);
    setTimeout(() => spawnRandomAnimal(a.kind), 15000);
  }
}

// ----- Quản lý thịt -----
let meatInventory = { pig: 0, cow: 0, sheep: 0 };
let totalMeat = 0;

function addMeat(kind) {
  meatInventory[kind]++;
  totalMeat++;
  updateHungerUI();
  renderInventoryPanel();
}

function useMeat() {
  const kinds = ['pig', 'cow', 'sheep'];
  for (const kind of kinds) {
    if (meatInventory[kind] > 0) {
      meatInventory[kind]--;
      totalMeat--;
      return MEAT_TYPES[kind].name;
    }
  }
  return null;
}

// ----- Hotbar UI -----
const hotbar = document.getElementById('hotbar');
BLOCK_TYPES.forEach((b, i) => {
  const el = document.createElement('div');
  el.className = 'slot' + (i === selectedBlock ? ' active' : '');
  el.style.background = '#' + b.color.toString(16).padStart(6,'0');
  el.style.position = 'relative';
  el.title = b.name;
  const count = document.createElement('span');
  count.className = 'hotbarCount';
  count.textContent = inventory[i];
  el.appendChild(count);
  el.addEventListener('click', () => { selectedBlock = i; updateHotbar(); });
  hotbar.appendChild(el);
});

function updateHotbar() {
  [...hotbar.children].forEach((el, i) => {
    el.classList.toggle('active', i === selectedBlock);
    el.querySelector('.hotbarCount').textContent = inventory[i];
  });
}
updateHotbar();

// ----- Điều khiển góc nhìn -----
const blocker = document.getElementById('blocker');
const mobileControls = document.getElementById('mobileControls');
let yaw = 0, pitch = 0;
let gameActive = false;

const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

if (isMobile) {
  mobileControls.style.display = 'block';
  document.getElementById('hint').innerHTML =
    'Joystick: di chuyển | Vuốt phải: nhìn<br>Phá/Đánh | Đặt | Nhảy | 🪑 Ngồi | 🏃 Chạy';
}

function activateGame() {
  gameActive = true;
  blocker.style.display = 'none';
  if (!isMobile && document.pointerLockElement !== document.body) {
    document.body.requestPointerLock();
  }
}

blocker.addEventListener('click', activateGame);
blocker.addEventListener('touchstart', (e) => { e.preventDefault(); activateGame(); });

document.addEventListener('pointerlockchange', () => {
  if (!isMobile) {
    gameActive = (document.pointerLockElement === document.body);
    blocker.style.display = gameActive ? 'none' : 'flex';
  }
});

// ----- Cài đặt độ nhạy -----
let mouseSensitivity = 1, touchSensitivity = 1;
let settingsOpen = false;
document.getElementById('settingsBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsOpen = true;
  document.getElementById('settingsPanel').style.display = 'flex';
  if (document.pointerLockElement) document.exitPointerLock();
});
document.getElementById('closeSettings').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsOpen = false;
  document.getElementById('settingsPanel').style.display = 'none';
  if (!isMobile && gameActive) document.body.requestPointerLock();
});

const mouseSensSlider = document.getElementById('mouseSensSlider');
mouseSensSlider.addEventListener('input', () => {
  mouseSensitivity = parseFloat(mouseSensSlider.value);
  document.getElementById('mouseSensVal').textContent = mouseSensitivity.toFixed(1) + 'x';
});
const touchSensSlider = document.getElementById('touchSensSlider');
touchSensSlider.addEventListener('input', () => {
  touchSensitivity = parseFloat(touchSensSlider.value);
  document.getElementById('touchSensVal').textContent = touchSensitivity.toFixed(1) + 'x';
});

// ----- Túi đồ -----
let invOpen = false;
const inventoryBtn = document.getElementById('inventoryBtn');
const inventoryPanel = document.getElementById('inventoryPanel');
const invGrid = document.getElementById('invGrid');

function renderInventoryPanel() {
  invGrid.innerHTML = '';
  BLOCK_TYPES.forEach((b, i) => {
    const item = document.createElement('div');
    item.className = 'invItem';
    const color = i === 6 ? '#1e88e5' : '#' + b.color.toString(16).padStart(6,'0');
    item.innerHTML = `<div class="invSwatch" style="background:${color}"></div><span>${b.name}</span><span>x${inventory[i]}</span>`;
    invGrid.appendChild(item);
  });
  ['pig', 'cow', 'sheep'].forEach(kind => {
    const item = document.createElement('div');
    item.className = 'invItem';
    const color = '#' + MEAT_TYPES[kind].color.toString(16).padStart(6,'0');
    item.innerHTML = `<div class="invSwatch" style="background:${color}"></div><span>${MEAT_TYPES[kind].name}</span><span>x${meatInventory[kind]}</span>`;
    invGrid.appendChild(item);
  });
}

function openInventory() {
  invOpen = true;
  renderInventoryPanel();
  inventoryPanel.style.display = 'flex';
  if (document.pointerLockElement) document.exitPointerLock();
}
function closeInventory() {
  invOpen = false;
  inventoryPanel.style.display = 'none';
  if (!isMobile && gameActive) document.body.requestPointerLock();
}
inventoryBtn.addEventListener('click', openInventory);
document.getElementById('closeInventory').addEventListener('click', closeInventory);

// ----- Xử lý chuột -----
document.addEventListener('mousemove', (e) => {
  if (!gameActive || isMobile || settingsOpen || invOpen) return;
  yaw -= e.movementX * 0.0022 * mouseSensitivity;
  pitch -= e.movementY * 0.0022 * mouseSensitivity;
  pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
});

// ----- Mobile touch camera -----
const lookArea = document.getElementById('lookArea');
let lookTouchId = null, lastLookX = 0, lastLookY = 0;
lookArea.addEventListener('touchstart', (e) => {
  if (!gameActive) return;
  const t = e.changedTouches[0];
  lookTouchId = t.identifier; lastLookX = t.clientX; lastLookY = t.clientY;
}, { passive: true });
lookArea.addEventListener('touchmove', (e) => {
  if (!gameActive || settingsOpen || invOpen) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouchId) continue;
    yaw -= (t.clientX - lastLookX) * 0.0045 * touchSensitivity;
    pitch -= (t.clientY - lastLookY) * 0.0045 * touchSensitivity;
    lastLookX = t.clientX; lastLookY = t.clientY;
    pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
  }
}, { passive: true });

// ----- Joystick -----
let joyVec = { x: 0, y: 0 }, joyTouchId = null;
const joyKnob = document.getElementById('joystickKnob');
document.getElementById('joystickBase').addEventListener('touchstart', (e) => {
  joyTouchId = e.changedTouches[0].identifier;
}, { passive: true });
document.getElementById('joystickBase').addEventListener('touchmove', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier !== joyTouchId) continue;
    const r = document.getElementById('joystickBase').getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const dist = Math.min(Math.hypot(dx, dy), 45);
    const angle = Math.atan2(dy, dx);
    dx = Math.cos(angle) * dist; dy = Math.sin(angle) * dist;
    joyKnob.style.left = (35 + dx) + 'px'; joyKnob.style.top = (35 + dy) + 'px';
    joyVec = { x: dx / 45, y: dy / 45 };
  }
}, { passive: true });
document.getElementById('joystickBase').addEventListener('touchend', () => {
  joyTouchId = null; joyVec = {x:0,y:0}; joyKnob.style.left='35px'; joyKnob.style.top='35px';
});

// ----- Nút mobile -----
const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['Space'] = true; }, { passive: false });
jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys['Space'] = false; }, { passive: false });

document.getElementById('breakBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameActive) breakBlock();
}, { passive: false });
document.getElementById('placeBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameActive) placeBlock();
}, { passive: false });

// ----- Phím tắt -----
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

window.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '7') { selectedBlock = parseInt(e.key) - 1; updateHotbar(); }
  if (e.key === 'i' || e.key === 'I') { invOpen ? closeInventory() : openInventory(); }
  if (e.key === 'f' || e.key === 'F') { eatMeat(); }
  if (e.key === 'c' || e.key === 'C') { setSitting(!isSitting); }
});

// ----- Ngồi / Chạy -----
let isSitting = false, runButtonHeld = false;
const sitBtn = document.getElementById('sitBtn');
const runBtn = document.getElementById('runBtn');

function setSitting(v) {
  isSitting = v;
  sitBtn.classList.toggle('toggledOn', v);
  document.getElementById('sitMobileBtn').classList.toggle('toggledOn', v);
  sitBtn.textContent = v ? '🪑 Đứng' : '🪑 Ngồi';
  if (v) player.vel.set(0, 0, 0);
}
sitBtn.addEventListener('click', () => setSitting(!isSitting));

function setRunning(v) {
  runButtonHeld = v;
  const rNow = isRunningNow();
  runBtn.classList.toggle('toggledOn', rNow);
  document.getElementById('runMobileBtn').classList.toggle('toggledOn', rNow);
}
function isRunningNow() { return !isSitting && (runButtonHeld || keys['ShiftLeft'] || keys['ShiftRight']); }
runBtn.addEventListener('mousedown', () => setRunning(true));
runBtn.addEventListener('mouseup', () => setRunning(false));
runBtn.addEventListener('mouseleave', () => setRunning(false));

document.getElementById('sitMobileBtn').addEventListener('touchstart', (e) => { e.preventDefault(); setSitting(!isSitting); }, { passive: false });
document.getElementById('runMobileBtn').addEventListener('touchstart', (e) => { e.preventDefault(); setRunning(!runButtonHeld); }, { passive: false });

// ----- Người chơi -----
const player = {
  pos: new THREE.Vector3(0, heightAt(0,0) + 5, 0),
  vel: new THREE.Vector3(0,0,0),
  onGround: false,
};

// ----- Máu -----
let health = 100, hunger = 100;
const healthBarFill = document.getElementById('healthBarFill');
const healthText = document.getElementById('healthText');

function takeDamage(amount) {
  health = Math.max(0, health - amount);
  healthBarFill.style.width = health + '%';
  healthText.textContent = Math.round(health);
  if (health <= 0) respawnPlayer();
}

function respawnPlayer() {
  player.pos.set(0, heightAt(0,0) + 5, 0);
  player.vel.set(0, 0, 0);
  health = 100;
  takeDamage(0);
}

function updateHealthUI() {
  healthBarFill.style.width = health + '%';
  healthText.textContent = Math.round(health);
}
updateHealthUI();

// ----- Đói -----
const hungerBarFill = document.getElementById('hungerBarFill');
const hungerText = document.getElementById('hungerText');
const meatCountLabel = document.getElementById('meatCountLabel');
const eatBtn = document.getElementById('eatBtn');

function updateHungerUI() {
  hungerBarFill.style.width = hunger + '%';
  hungerText.textContent = Math.round(hunger);
  meatCountLabel.textContent = totalMeat;
  eatBtn.disabled = totalMeat <= 0 || hunger >= 100;
}

function eatMeat() {
  if (totalMeat <= 0 || hunger >= 100) return;
  const meatName = useMeat();
  if (meatName) {
    hunger = Math.min(100, hunger + 35);
    updateHungerUI();
    renderInventoryPanel();
  }
}
eatBtn.addEventListener('click', eatMeat);

setInterval(() => {
  hunger = Math.max(0, hunger - 1);
  updateHungerUI();
}, 15000);

setInterval(() => {
  if (hunger > 20 && health < 100 && health > 0) {
    health = Math.min(100, health + 1);
    hunger = Math.max(0, hunger - 1);
    updateHealthUI();
    updateHungerUI();
  } else if (hunger <= 0 && health > 0) {
    takeDamage(1);
  }
}, 3000);

updateHungerUI();

// ----- Kiểm tra va chạm -----
function isSolid(x, y, z) {
  return worldData.has(key(Math.round(x), Math.round(y), Math.round(z)));
}

// ----- Cập nhật người chơi -----
function updatePlayer() {
  if (isSitting) {
    camera.position.set(player.pos.x, player.pos.y - 0.4, player.pos.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    return;
  }

  const running = isRunningNow();
  const speed = 0.12 * (running ? 1.8 : 1);
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  let move = new THREE.Vector3();
  if (keys['KeyW']) move.add(forward);
  if (keys['KeyS']) move.sub(forward);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);
  
  if (joyVec.x !== 0 || joyVec.y !== 0) {
    move.add(forward.clone().multiplyScalar(-joyVec.y));
    move.add(right.clone().multiplyScalar(joyVec.x));
  }

  if (move.lengthSq() > 1) move.normalize();
  move.multiplyScalar(speed);

  const nx = player.pos.x + move.x;
  const nz = player.pos.z + move.z;
  if (!isSolid(nx, player.pos.y, player.pos.z) && !isSolid(nx, player.pos.y - 1, player.pos.z)) player.pos.x = nx;
  if (!isSolid(player.pos.x, player.pos.y, nz) && !isSolid(player.pos.x, player.pos.y - 1, nz)) player.pos.z = nz;

  player.vel.y -= 0.015;
  if (keys['Space'] && player.onGround) {
    player.vel.y = 0.25;
    player.onGround = false;
  }

  const ny = player.pos.y + player.vel.y;
  if (isSolid(player.pos.x, ny - 1.6, player.pos.z) && player.vel.y < 0) {
    if (player.vel.y < -0.42) takeDamage(Math.round((Math.abs(player.vel.y) - 0.4) * 60));
    player.vel.y = 0;
    player.onGround = true;
  } else {
    player.pos.y = ny;
    player.onGround = false;
  }

  camera.position.set(player.pos.x, player.pos.y, player.pos.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  if (player.pos.y < -30) respawnPlayer();
}

// ----- Raycast phá/đặt block -----
const raycaster = new THREE.Raycaster();
raycaster.far = 6;

function getTargetHit() {
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const activeMeshes = instancedMeshes.filter(im => im.count > 0);
  const hits = raycaster.intersectObjects(activeMeshes);
  return hits.length ? hits[0] : null;
}

// ----- Hiệu ứng rơi item -----
const dropEffects = [];
function spawnDropEffect(x, y, z, color) {
  const mat = new THREE.MeshLambertMaterial({ color, transparent: true });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  dropEffects.push({ mesh, start: performance.now(), duration: 450 });
}

function updateDropEffects() {
  const now = performance.now();
  for (let i = dropEffects.length - 1; i >= 0; i--) {
    const d = dropEffects[i];
    const t = Math.min(1, (now - d.start) / d.duration);
    d.mesh.position.y += 0.012;
    d.mesh.scale.setScalar(1 - t * 0.8);
    d.mesh.material.opacity = 1 - t;
    if (t >= 1) {
      scene.remove(d.mesh);
      d.mesh.geometry.dispose();
      d.mesh.material.dispose();
      dropEffects.splice(i, 1);
    }
  }
}

function breakBlock() {
  const hit = getTargetHit();
  if (!hit) return;
  
  // Kiểm tra nếu là động vật
  const instanceId = hit.instanceId;
  const typeIndex = instancedMeshes.indexOf(hit.object);
  
  // Tìm block trong worldData
  for (let [kStr, val] of worldVisuals.entries()) {
    if (val.type === typeIndex && val.instanceIdx === instanceId) {
      // Kiểm tra nếu là động vật (không có trong worldData)
      if (typeIndex === -1) return;
      
      // Kiểm tra nếu là khối nước
      if (typeIndex === 6) {
        worldData.delete(kStr);
        inventory[6]++;
        updateHotbar();
        spawnDropEffect(parseInt(kStr.split(',')[0]), parseInt(kStr.split(',')[1]), parseInt(kStr.split(',')[2]), 0x1e88e5);
        rebuildVisuals();
        return;
      }
      
      worldData.delete(kStr);
      inventory[typeIndex]++;
      updateHotbar();
      const pos = kStr.split(',').map(Number);
      spawnDropEffect(pos[0], pos[1], pos[2], BLOCK_TYPES[typeIndex].color);
      rebuildVisuals();
      break;
    }
  }
}

function placeBlock() {
  if (inventory[selectedBlock] <= 0) return;
  const hit = getTargetHit();
  if (!hit) return;
  
  const n = hit.face.normal;
  const matrix = new THREE.Matrix4();
  hit.object.getMatrixAt(hit.instanceId, matrix);
  const position = new THREE.Vector3().setFromMatrixPosition(matrix);
  
  const nx = Math.round(position.x + n.x);
  const ny = Math.round(position.y + n.y);
  const nz = Math.round(position.z + n.z);
  const kStr = key(nx, ny, nz);

  if (!worldData.has(kStr)) {
    worldData.set(kStr, selectedBlock);
    inventory[selectedBlock]--;
    updateHotbar();
    rebuildVisuals();
  }
}

// ----- Sự kiện chuột -----
window.addEventListener('mousedown', (e) => {
  if (!gameActive || isMobile || settingsOpen || invOpen) return;
  if (e.button === 0) breakBlock();
  else if (e.button === 2) placeBlock();
});
window.addEventListener('contextmenu', e => e.preventDefault());

// ----- Toàn màn hình -----
const fullscreenBtn = document.getElementById('fullscreenBtn');
fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {});
    fullscreenBtn.textContent = '⤓';
  } else {
    document.exitFullscreen();
    fullscreenBtn.textContent = '⛶';
  }
});
document.addEventListener('fullscreenchange', () => {
  fullscreenBtn.textContent = document.fullscreenElement ? '⤓' : '⛶';
});

// ----- Vòng lặp chính -----
function animate() {
  requestAnimationFrame(animate);
  if (gameActive && !settingsOpen && !invOpen) updatePlayer();
  updateAnimals();
  updateDropEffects();
  renderer.render(scene, camera);
}
animate();
</script>
