<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Silent Room | Psychological Horror Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            font-family: 'Courier New', 'VT323', monospace;
            overflow: hidden;
            position: relative;
        }

        /* CRT and VHS overlays */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0px, rgba(0,0,0,0.25) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 998;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 997;
        }

        .glitch-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 100, 0.1);
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 999;
            animation: glitchPulse 0.15s infinite;
            opacity: 0;
        }

        @keyframes glitchPulse {
            0% { opacity: 0; }
            10% { opacity: 0.4; background: rgba(0, 255, 255, 0.2); transform: translate(1px, -1px);}
            20% { opacity: 0; }
            30% { opacity: 0.3; background: rgba(255, 0, 255, 0.2); transform: translate(-1px, 1px);}
            100% { opacity: 0; }
        }

        /* Main Menu Styles */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0508 0%, #010001 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .menu-title {
            font-size: 4rem;
            letter-spacing: 12px;
            color: #aa5252;
            text-shadow: 0 0 15px #ff0000, 0 0 5px #2a0000;
            margin-bottom: 50px;
            font-weight: bold;
            animation: titleFlicker 3s infinite;
        }

        @keyframes titleFlicker {
            0% { opacity: 1; text-shadow: 0 0 15px #ff0000; }
            50% { opacity: 0.9; text-shadow: 0 0 5px #aa2222; }
            100% { opacity: 1; text-shadow: 0 0 15px #ff0000; }
        }

        .menu-btn {
            background: rgba(0,0,0,0.7);
            border: 2px solid #6a2e2e;
            color: #ddbb99;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            padding: 12px 32px;
            margin: 12px;
            width: 260px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            letter-spacing: 3px;
        }

        .menu-btn:hover {
            background: #331111;
            border-color: #bb5555;
            color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(180,0,0,0.5);
        }

        .lang-selector {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: #110a0a;
            border: 1px solid #5a3a3a;
            color: #aa8888;
            padding: 6px 16px;
            cursor: pointer;
            font-family: monospace;
        }

        .lang-btn.active {
            background: #442222;
            color: white;
            border-color: #cc7777;
        }

        .credits-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2001;
            color: #554444;
            font-size: 0.7rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* Game Container */
        #game-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0c12 0%, #020304 100%);
            display: none;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }

        .cinematic-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: contrast(1.2) brightness(0.55) grayscale(0.4);
            transition: filter 0.4s;
            z-index: 0;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .stats-panel {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.75);
            padding: 10px 20px;
            border-radius: 4px;
            border-left: 4px solid #8b0000;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 1rem;
            color: #bcbcbc;
            letter-spacing: 1px;
        }

        .stat span { color: #d46b6b; }

        .clock {
            font-size: 1.3rem;
            background: black;
            padding: 4px 12px;
            border-radius: 2px;
            color: #ff4444;
            text-shadow: 0 0 4px red;
        }

        .dialogue-box {
            background: rgba(0, 0, 0, 0.88);
            border-top: 2px solid #4a2a2a;
            border-left: 2px solid #2a1a1a;
            padding: 20px;
            margin: 20px;
            max-width: 750px;
            align-self: center;
            width: 90%;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            font-size: 1.2rem;
            color: #ddd8c6;
        }

        .typewriter-text {
            min-height: 100px;
            line-height: 1.4;
        }

        .choices {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 25px;
            justify-content: center;
        }

        .choice-btn {
            background: #110b0b;
            border: 1px solid #6a3e3e;
            color: #ebd5b3;
            padding: 8px 18px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:hover {
            background: #2c1a1a;
            border-color: #aa6f6f;
            transform: scale(1.02);
        }

        .scene-title {
            text-align: center;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #884d4d;
            letter-spacing: 3px;
        }

        button.reset-btn {
            background: none;
            border: 1px solid #441111;
            color: #886666;
            padding: 5px 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        @keyframes vhs-jitter {
            0% { transform: translate(0);}
            25% { transform: translate(1px, -1px);}
            50% { transform: translate(-1px, 0);}
            100% { transform: translate(0);}
        }

        .glitch-active { animation: vhs-jitter 0.08s infinite; }

        @media (max-width: 600px) {
            .dialogue-box { font-size: 0.9rem; }
            .stat { font-size: 0.7rem; }
            .menu-title { font-size: 2.2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>
<div id="main-menu">
    <div class="menu-title">SILENT ROOM</div>
    <div class="menu-btn" id="play-btn">▶ PLAY</div>
    <div class="menu-btn" id="credits-btn">📜 CREDITS</div>
    <div class="lang-selector">
        <div class="lang-btn active" data-lang="en">ENGLISH</div>
        <div class="lang-btn" data-lang="vn">TIẾNG VIỆT</div>
    </div>
    <div class="credits-panel" id="mini-credits">© DARK INDIE — SILENCE SPEAKS</div>
</div>

<div id="game-container">
    <div class="cinematic-bg" id="bgImage"></div>
    <div class="ui-layer">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div class="stats-panel">
                <div class="stat">❤️ TRUST: <span id="trustVal">50</span>%</div>
                <div class="stat">🌙 STRESS: <span id="stressVal">0</span>%</div>
                <div class="stat">🕯️ CORRUPTION: <span id="corruptVal">0</span>%</div>
                <div class="stat">📖 MEMORY: <span id="memoryVal">0</span>%</div>
            </div>
            <div class="clock" id="clockDisplay">⏰ 20:00</div>
        </div>
        <div class="dialogue-box">
            <div class="typewriter-text" id="dialogueText">...</div>
            <div class="choices" id="choicesContainer"></div>
            <div style="text-align: center; margin-top: 8px;">
                <button class="reset-btn" id="resetGameBtn">⟳ RESTART / BACK TO MENU</button>
            </div>
        </div>
        <div class="scene-title" id="sceneName">--- hallway of echoes ---</div>
    </div>
</div>

<!-- Audio Context & Sound -->
<audio id="bgmAudio" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<audio id="glitchSound" preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>
<audio id="whisperSound" preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>

<script>
    // ---------- LANGUAGE DICTIONARY ----------
    const langData = {
        en: {
            menuTitle: "SILENT ROOM", play: "▶ PLAY", credits: "📜 CREDITS",
            creditsText: "CREATIVE DIRECTION & NARRATIVE: Silent Child\nSOUND DESIGN: Ambient Drones\nART: Liminal Echoes\nSPECIAL THANKS: Those who broke their silence.",
            endings: { good: "You Were Heard", neutral: "Nobody Noticed", bad: "The Silence Stayed", secret: "The Door Stayed Open" }
        },
        vn: {
            menuTitle: "CĂN PHÒNG CÂM LẶNG", play: "▶ CHƠI", credits: "📜 CREDITS",
            creditsText: "ĐẠO DIỄN & KỊCH BẢN: Đứa Trẻ Câm Lặng\nTHIẾT KẾ ÂM THANH: Ambient Drone\nĐỒ HỌA: Dấu Vọng\nCẢM ƠN: Những ai đã phá tan sự im lặng.",
            endings: { good: "Bạn Đã Được Lắng Nghe", neutral: "Không Ai Để Ý", bad: "Sự Im Lặng Ở Lại", secret: "Cánh Cửa Vẫn Mở" }
        }
    };
    let currentLang = "en";

    // Game State
    let gameState = {
        trust: 50, stress: 0, corruption: 0, memory: 0,
        hour: 20, minute: 0, gameActive: true, endingFlag: null,
        endingsUnlocked: []
    };
    let typewriterTimeout = null;
    let isTyping = false;
    let ambientAudio = null;
    let glitchAudio = null;
    let isAudioEnabled = false;

    function initAudio() {
        ambientAudio = document.getElementById("bgmAudio");
        glitchAudio = document.getElementById("glitchSound");
        if (ambientAudio) { ambientAudio.volume = 0.2; ambientAudio.loop = true; }
        if (glitchAudio) glitchAudio.volume = 0.15;
        isAudioEnabled = true;
        // attempt to play on user interaction
        document.body.addEventListener('click', () => { if(ambientAudio && ambientAudio.paused && gameState.gameActive) ambientAudio.play().catch(e=>console.log); }, { once: true });
    }

    function playAmbient() { if(ambientAudio && gameState.gameActive && isAudioEnabled) ambientAudio.play().catch(e=>console.log); }
    function stopAmbient() { if(ambientAudio) ambientAudio.pause(); }

    function triggerGlitchSound() { if(glitchAudio && isAudioEnabled) { glitchAudio.currentTime=0; glitchAudio.play().catch(e=>console.log); } }

    function clamp(v,min,max){ return Math.min(max,Math.max(min,v)); }
    function updateUI() {
        document.getElementById("trustVal").innerText = Math.floor(gameState.trust);
        document.getElementById("stressVal").innerText = Math.floor(gameState.stress);
        document.getElementById("corruptVal").innerText = Math.floor(gameState.corruption);
        document.getElementById("memoryVal").innerText = Math.floor(gameState.memory);
        let timeStr = `${gameState.hour.toString().padStart(2,'0')}:${gameState.minute.toString().padStart(2,'0')}`;
        document.getElementById("clockDisplay").innerHTML = `⏰ ${timeStr}`;
        let bgDiv = document.getElementById("bgImage");
        let blurAmount = Math.min(6, gameState.corruption / 20);
        bgDiv.style.filter = `contrast(1.1) brightness(${0.6 - gameState.corruption/180}) grayscale(${gameState.corruption/110}) blur(${blurAmount}px)`;
        if(gameState.stress>=60 && !document.querySelector('.glitch-flash-active')){ 
            let flash = document.createElement('div'); flash.className='glitch-flash'; flash.style.animation='glitchPulse 0.12s infinite'; document.body.appendChild(flash);
            triggerGlitchSound();
        } else if(gameState.stress<60){ let f=document.querySelector('.glitch-flash'); if(f)f.remove(); }
    }

    function advanceTime(minutesAdd=5){
        if(!gameState.gameActive) return;
        gameState.minute+=minutesAdd;
        if(gameState.minute>=60){ gameState.hour++; gameState.minute=0; if(gameState.hour>23) gameState.hour=23; }
        updateUI();
    }
    function modifyStats(dTrust, dStress, dCorrupt, dMemory){
        if(!gameState.gameActive) return;
        gameState.trust = clamp(gameState.trust+dTrust,0,100);
        gameState.stress = clamp(gameState.stress+dStress,0,100);
        gameState.corruption = clamp(gameState.corruption+dCorrupt,0,100);
        gameState.memory = clamp(gameState.memory+dMemory,0,100);
        if(gameState.corruption>=85 && gameState.trust<20) triggerEnding("bad");
        if(gameState.memory>=80 && gameState.trust>=70 && gameState.corruption<=25) triggerEnding("good");
        if(gameState.stress>=95) triggerEnding("neutral");
        if(gameState.memory>=70 && gameState.corruption>=40 && gameState.trust<=30 && gameState.gameActive) triggerEnding("secret");
        updateUI();
    }

    function setBackground(sceneKey){
        const bgMap = { hallway:"https://placehold.co/1920x1080/1a1210/2c1e1a?text=ABANDONED+HALLWAY", childroom:"https://placehold.co/1920x1080/0f0c18/1f1a2e?text=CRUMBLING+ROOM", classroom:"https://placehold.co/1920x1080/1c1b1a/3e2f2a?text=EMPTY+SCHOOL", night_corridor:"https://placehold.co/1920x1080/050505/2f1414?text=NARROW+HALL", memory_garden:"https://placehold.co/1920x1080/15222b/1d3e3a?text=FADED+GARDEN", door_room:"https://placehold.co/1920x1080/0a080f/2b1b2c?text=THE+DOOR" };
        document.getElementById("bgImage").style.backgroundImage = `url('${bgMap[sceneKey]||bgMap.hallway}')`;
    }

    async function typewriterEffect(text, element, speed=32){
        if(typewriterTimeout) clearTimeout(typewriterTimeout);
        isTyping=true;
        element.innerHTML="";
        for(let i=0;i<text.length;i++){ if(!gameState.gameActive) break; element.innerHTML+=text[i]; await new Promise(r=>setTimeout(r,speed)); }
        isTyping=false;
    }

    async function showScene(scene){
        if(!gameState.gameActive) return;
        setBackground(scene.bg);
        document.getElementById("sceneName").innerText = scene.sceneTitle || "--- silent room ---";
        await typewriterEffect(scene.dialogue, document.getElementById("dialogueText"), 28);
        let container = document.getElementById("choicesContainer");
        container.innerHTML = "";
        scene.choices.forEach(choice => {
            let btn = document.createElement("button");
            btn.innerText = choice.text;
            btn.className = "choice-btn";
            btn.onclick = () => { if(gameState.gameActive) choice.action(); };
            container.appendChild(btn);
        });
    }

    function triggerEnding(type){
        if(!gameState.gameActive) return;
        gameState.gameActive=false;
        stopAmbient();
        let endingKey = { good:"good", neutral:"neutral", bad:"bad", secret:"secret" }[type];
        let endingDisplay = langData[currentLang].endings[endingKey];
        if(!gameState.endingsUnlocked.includes(endingDisplay)) gameState.endingsUnlocked.push(endingDisplay);
        localStorage.setItem("silentRoomEndings", JSON.stringify(gameState.endingsUnlocked));
        document.getElementById("dialogueText").innerHTML = `[GAME OVER] --- ${endingDisplay} ---\n\nYour echoes remain in the silent room.\n\nPress RESTART.`;
        document.getElementById("choicesContainer").innerHTML = "";
        updateUI();
    }

    // --- SCENES (symbolic) ---
    function sceneTransition(sceneId){
        const scenes = {
            hallway_start: { bg:"hallway", sceneTitle:"the hallway - no footsteps", dialogue:"You stand in a narrow corridor. Wallpaper peels like old skin. The clock ticks unevenly. Your shadow seems too tall tonight.", choices:[
                { text:"🔍 Look at the mirror", action:()=>{ modifyStats(0,5,2,2); advanceTime(10); sceneTransition("mirror_scene"); } },
                { text:"🚪 Enter living room", action:()=>{ modifyStats(-2,7,3,0); advanceTime(15); sceneTransition("livingroom_stepfather"); } },
                { text:"📓 Go to your room", action:()=>{ modifyStats(5,-3,-1,10); advanceTime(20); sceneTransition("childroom_memory"); } }
            ]},
            mirror_scene:{ bg:"night_corridor", sceneTitle:"cracked reflection", dialogue:"The mirror shows hollow eyes. Behind you, a tall figure fades. A whisper: 'Be silent.'", choices:[
                { text:"Whisper 'I am here'", action:()=>{ modifyStats(10,12,5,5); advanceTime(5); sceneTransition("hallway_start"); } },
                { text:"Turn around quickly", action:()=>{ modifyStats(-5,18,8,2); advanceTime(5); sceneTransition("livingroom_stepfather"); } }
            ]},
            livingroom_stepfather:{ bg:"night_corridor", sceneTitle:"the heavy armchair", dialogue:"The room is cold. A tall figure sits in shadow. 'The silence suits you tonight. You know what happens when words break the quiet.'", choices:[
                { text:"Nod and slip away", action:()=>{ modifyStats(-8,15,12,0); advanceTime(20); sceneTransition("hallway_start"); } },
                { text:"Say 'I have a voice'", action:()=>{ modifyStats(-15,20,18,10); advanceTime(25); sceneTransition("nightmare_hall"); } },
                { text:"Ask about mother", action:()=>{ modifyStats(2,25,15,5); advanceTime(10); sceneTransition("broken_teacher"); } }
            ]},
            nightmare_hall:{ bg:"night_corridor", sceneTitle:"twisting corridor", dialogue:"Walls bleed shadows. 'You broke the pact.' Clock strikes 2 AM.", choices:[
                { text:"Run toward faint light", action:()=>{ modifyStats(5,30,5,15); advanceTime(10); sceneTransition("classroom_friend"); } },
                { text:"Hide inside closet", action:()=>{ modifyStats(-15,40,20,-5); advanceTime(20); sceneTransition("closet_silence"); } }
            ]},
            classroom_friend:{ bg:"classroom", sceneTitle:"desks and whispers", dialogue:"Your friend Leo: 'You look tired. Is it... him again? I believe you.' He offers a drawing of a door.", choices:[
                { text:"Accept and confide", action:()=>{ modifyStats(15,-10,-5,20); advanceTime(15); sceneTransition("memory_garden_scene"); } },
                { text:"Say nothing", action:()=>{ modifyStats(-5,5,10,0); advanceTime(10); sceneTransition("hallway_start"); } }
            ]},
            memory_garden_scene:{ bg:"memory_garden", sceneTitle:"overgrown promises", dialogue:"You recall a garden before silence. A younger you laughs. Fog swallows everything. A door appears, slightly ajar.", choices:[
                { text:"Open the door gently", action:()=>{ modifyStats(20,-15,-15,35); advanceTime(0); sceneTransition("final_door"); } },
                { text:"Walk away afraid", action:()=>{ modifyStats(-5,12,8,-5); advanceTime(20); sceneTransition("livingroom_stepfather"); } }
            ]},
            childroom_memory:{ bg:"childroom", sceneTitle:"old stuffed rabbit", dialogue:"Music box broken tune. Under the bed a drawing from happy times. Word 'HELP' faint.", choices:[
                { text:"Keep the drawing", action:()=>{ modifyStats(5,-5,-2,20); advanceTime(10); sceneTransition("hallway_start"); } },
                { text:"Tear it up (numbness)", action:()=>{ modifyStats(-10,15,12,-15); advanceTime(15); sceneTransition("livingroom_stepfather"); } }
            ]},
            broken_teacher:{ bg:"classroom", sceneTitle:"detention of echoes", dialogue:"Teacher Ms. Vellum: 'Your grades are slipping. Everything alright at home?' She glances nervously.", choices:[
                { text:"'I'm fine' (silence)", action:()=>{ modifyStats(-8,10,10,-5); advanceTime(20); sceneTransition("hallway_start"); } },
                { text:"'I need help'", action:()=>{ modifyStats(15,-5,-10,20); advanceTime(15); sceneTransition("memory_garden_scene"); } }
            ]},
            closet_silence:{ bg:"night_corridor", sceneTitle:"breath in the dark", dialogue:"Inside closet, heavy footsteps. 'You are good when quiet.' Hours pass. A crack of light.", choices:[
                { text:"Crawl toward light", action:()=>{ modifyStats(-20,40,15,5); advanceTime(25); sceneTransition("hallway_start"); } }
            ]},
            final_door:{ bg:"door_room", sceneTitle:"threshold", dialogue:"White wooden door. Warm breeze, your own laughter. The Stepfather's voice fades: 'You were never supposed to speak...' Do you cross?", choices:[
                { text:"CROSS THE DOOR (healing)", action:()=>{ modifyStats(40,-50,-40,60); if(gameState.memory>=70 && gameState.corruption<=40) triggerEnding("good"); else triggerEnding("neutral"); } },
                { text:"Stay in silent room", action:()=>{ modifyStats(-30,30,25,-15); triggerEnding("bad"); } }
            ]}
        };
        if(scenes[sceneId]) showScene(scenes[sceneId]);
        else showScene(scenes.hallway_start);
    }

    function resetGameToMenu(){
        if(typewriterTimeout) clearTimeout(typewriterTimeout);
        stopAmbient();
        gameState = { trust:50, stress:0, corruption:0, memory:0, hour:20, minute:0, gameActive:true, endingFlag:null, endingsUnlocked: gameState?.endingsUnlocked || [] };
        updateUI();
        document.getElementById("game-container").style.display = "none";
        document.getElementById("main-menu").style.display = "flex";
        let flashes = document.querySelectorAll('.glitch-flash'); flashes.forEach(f=>f.remove());
    }

    function startGame(){
        document.getElementById("main-menu").style.display = "none";
        document.getElementById("game-container").style.display = "flex";
        gameState = { trust:50, stress:0, corruption:0, memory:0, hour:20, minute:0, gameActive:true, endingFlag:null, endingsUnlocked: gameState?.endingsUnlocked || [] };
        updateUI();
        sceneTransition("hallway_start");
        playAmbient();
        let interval = setInterval(()=>{
            if(gameState.gameActive){
                if(gameState.hour>=22||gameState.hour<=5){ modifyStats(0, gameState.corruption>30?2:1,0,0); }
                if(gameState.stress>70) modifyStats(-1,1,1,0);
                if(gameState.trust<=20 && gameState.hour>=23) modifyStats(0,2,2,0);
                if(gameState.memory>=70 && gameState.corruption>=40 && gameState.trust<=30 && gameState.gameActive) triggerEnding("secret");
            }
        }, 15000);
        window._gameInterval = interval;
    }

    // Load saved endings
    function loadEndings(){
        let saved = localStorage.getItem("silentRoomEndings");
        if(saved) gameState.endingsUnlocked = JSON.parse(saved);
    }

    // Language handling
    function setLanguage(lang){
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(btn=>btn.classList.remove("active"));
        document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add("active");
        document.querySelector(".menu-title").innerText = langData[lang].menuTitle;
        document.getElementById("play-btn").innerText = langData[lang].play;
        document.getElementById("credits-btn").innerText = langData[lang].credits;
    }

    // Credits modal simulation
    function showCredits() {
        alert(langData[currentLang].creditsText);
    }

    // Event bindings
    document.getElementById("play-btn").onclick = () => { startGame(); };
    document.getElementById("credits-btn").onclick = showCredits;
    document.getElementById("resetGameBtn").onclick = () => { resetGameToMenu(); if(window._gameInterval) clearInterval(window._gameInterval); };
    document.querySelectorAll(".lang-btn").forEach(btn=>{
        btn.onclick = (e) => { setLanguage(btn.getAttribute("data-lang")); };
    });
    document.getElementById("mini-credits").onclick = showCredits;

    initAudio();
    loadEndings();
    setLanguage("en");
    // Show menu, ensure game hidden
    document.getElementById("game-container").style.display = "none";
    document.getElementById("main-menu").style.display = "flex";
    // Additional overlay elements
    let crtDiv = document.createElement('div'); crtDiv.className='crt-overlay'; document.body.appendChild(crtDiv);
    let vignetteDiv = document.createElement('div'); vignetteDiv.className='vignette'; document.body.appendChild(vignetteDiv);
</script>
</body>
</html>
